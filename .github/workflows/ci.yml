name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-test-train:
    name: Lint, test, and smoke-train
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check src tests

      - name: Pytest with coverage
        run: pytest --cov=src --cov-report=xml --cov-report=term

      - name: Smoke-train (fast grid)
        run: python -m src.train --fast

      - name: Upload trained model artefact
        uses: actions/upload-artifact@v4
        with:
          name: heart-model
          path: |
            models/heart_model.joblib
            models/metrics.json
            reports/figures/*.png
          if-no-files-found: warn

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-test-train

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: heart-model
          path: models/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: heart-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        run: |
          docker run -d --rm --name heart-api -p 8000:8000 heart-api:ci
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              echo "API is up"; break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/health | tee /dev/stderr
          curl -fsS -X POST http://127.0.0.1:8000/predict \
            -H 'Content-Type: application/json' \
            -d '{"age":63,"sex":"Male","dataset":"Cleveland","cp":"typical angina","trestbps":145,"chol":233,"fbs":true,"restecg":"lv hypertrophy","thalch":150,"exang":false,"oldpeak":2.3,"slope":"downsloping","ca":0,"thal":"fixed defect"}' | tee /dev/stderr
          docker stop heart-api
